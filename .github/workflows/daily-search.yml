   name: 每日文献搜集

   on:
     schedule:
       - cron: '0 0 * * *' # 每天UTC 0点（北京时间早上8点）
     workflow_dispatch: # 手动触发

   jobs:
     search:
       runs-on: ubuntu-latest
       permissions:
         contents: write

       steps:
         - name: 检出仓库
           uses: actions/checkout@v4

         - name: 设置Node.js 18
           uses: actions/setup-node@v4
           with:
             node-version: '18'

         - name: 安装依赖
           run: npm install

         - name: 运行搜索脚本
           env:
             COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
             COZE_DATASET_ID: ${{ secrets.COZE_DATASET_ID }}
           run: npm start

         - name: 提交并推送
           run: |
             git config user.name "NIR-Agent"
             git config user.email "agent@nir.local"
             git add data/
             git diff --staged --quiet || git commit -m "每日动态更新 $(date +%Y-%m-%d)"
             git push
   
